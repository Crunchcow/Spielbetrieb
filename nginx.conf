# Spielbetrieb – nginx Konfiguration
#
# Architektur:
#   nginx :8503 (öffentlich)
#     /callback  → Flask :8504  (OIDC-Callback-Handler)
#     /          → Streamlit :8505 (App, nur localhost)
#
# Services:
#   spielbetrieb.service          – Streamlit auf 127.0.0.1:8505
#   spielbetrieb-callback.service – Flask auf 127.0.0.1:8504

server {
    listen 80;
    server_name spielbetrieb.westfalia-osterwick.de;

    location /callback {
        proxy_pass http://127.0.0.1:8504;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://127.0.0.1:8505;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}

